<!-- 
Ejercicio 4 - Enlaces y navegación
Crear un menú de navegación con enlaces internos (a secciones del mismo HTML) y externos (abrir en nueva pestaña).
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ejercicio 4 - Enlaces y navegación en HTML">
    <title>Ejercicio 4 - Enlaces y navegación</title>
</head>
<body>
    <header>
        <h1>Ejercicio 4 - Enlaces y navegación</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#section1">Sección 1</a></li>
            <li><a href="#section2">Sección 2</a></li>
            <li><a href="#section3">Sección 3</a></li>
            <li><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">Enlace externo</a></li>
        </ul>
    </nav>
    <main>
        <section id="section1">
            <h2>Sección 1</h2>
            <p>Contenido de la sección 1.</p>
        </section>
        <section id="section2">
            <h2>Sección 2</h2>
            <p>Contenido de la sección 2.</p>
        </section>
        <section id="section3">
            <h2>Sección 3</h2>
            <p>Contenido de la sección 3.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Mi Sitio Web</p>
    </footer>
</body>
</html>

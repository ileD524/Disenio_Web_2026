<!-- 
Ejercicio 2 - Etiquetas estructurales
Dentro de <main>, crear:
- Una sección con un <h2>, párrafo <p> y una imagen (<img> con alt)
- Un <article> con título y contenido propio
- Un <aside> con información complementaria
-->
<!DOCTYPE html>
<main>
  <section>
    <h2>Sección de ejemplo</h2>
    <p>Este es un párrafo dentro de la sección.</p>
    <img src="imagen/spr_temface.png" alt="Imagen de ejemplo">
  </section>

  <article>
    <h2>Artículo de ejemplo</h2>
    <p>Este es un artículo que puede contener información relacionada.</p>
  </article>

  <aside>
    <h2>Información complementaria</h2>
    <p>Este es un aside que proporciona información adicional o enlaces relacionados con el contenido principal.</p>
  </aside>
</main>

<!-- 
Ejercicio 1 - Estructura base
Crear un archivo HTML que contenga la estructura básica con las siguientes secciones:
- <header>, <nav>, <main>, <section>, <footer>
- Título y metadatos en el <head> (mínimo 3 <meta>) 
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ejercicio 1 - Estructura base de HTML">
    <title>Ejercicio 1 - Estructura base</title>
</head>
<body>
    <header>
        <h1>Bienvenido a mi sitio web</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#section1">Sección 1</a></li>
            <li><a href="#section2">Sección 2</a></li>
            <li><a href="#section3">Sección 3</a></li>
        </ul>
    </nav>
    <main>
        <section id="section1">
            <h2>Sección 1</h2>
            <p>Contenido de la sección 1.</p>
        </section>
        <section id="section2">
            <h2>Sección 2</h2>
            <p>Contenido de la sección 2.</p>
        </section>
        <section id="section3">
            <h2>Sección 3</h2>
            <p>Contenido de la sección 3.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Mi Sitio Web</p>
    </footer>
</body>
</html>

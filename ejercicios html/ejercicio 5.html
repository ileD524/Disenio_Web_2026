<!-- 
Ejercicio 5 - Uso de atributos
Aplicar los siguientes atributos en distintas etiquetas:
- id, class, style, lang, title, align (aclarar que es obsoleto)
- Explicar con comentarios en el HTML qué hace cada uno
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ejercicio 5 - Uso de atributos en HTML">
    <title>Ejercicio 5 - Uso de atributos</title>
</head>
<body>
    <!-- El atributo id se utiliza para identificar de manera única un elemento en el documento. -->
    <!-- El atributo class se utiliza para clasificar elementos en grupos, permitiendo aplicar estilos o comportamientos comunes. -->
    <!-- El atributo style se utiliza para aplicar estilos CSS directamente a un elemento. -->
    <header id="main-header" class="header" style="background-color: lightblue; padding: 20px;">
        <h1 title="Título principal">Ejercicio 5 - Uso de atributos</h1>
    </header>
    <main>
    <!-- El atributo lang se utiliza para especificar el idioma del contenido de un elemento. -->
    <!-- El atributo title proporciona información adicional sobre un elemento, que suele mostrarse como un tooltip al pasar el cursor sobre él. -->
        <section lang="es" title="Sección de ejemplo">
            <h2>Sección de ejemplo</h2>
            <p class="paragraph" style="color: green;">Este es un párrafo con el atributo class y un estilo verde.</p>
            <img src="imagen/spr_temface.png" alt="Imagen de ejemplo" title="Imagen de ejemplo">
        </section>
    </main>
    <!-- El atributo align es obsoleto y se utilizaba para alinear el contenido de un elemento, pero ahora se recomienda usar CSS para este propósito. -->
    <footer align="center" style="background-color: lightgray; padding: 10px;">
        <p>&copy; 2026 Mi Sitio Web</p>
    </footer>
</body>
</html>

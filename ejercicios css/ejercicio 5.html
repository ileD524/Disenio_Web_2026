<!-- 
EJERCICIO 5 - Creación de botones personalizados: 
Diseña botones personalizados utilizando elementos
HTML como <button> o <a>, y aplica estilos CSS para cambiar su apariencia al pasar el cursor
sobre ellos.
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 5 - Creación de botones personalizados</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            padding: 20px;
            text-align: center;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            font-size: 1.2em;
            color: #fff;
            background-color: #3498db;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head><body>
    <h1>Botones personalizados en CSS</h1>
    <a href="#" class="btn">Botón 1</a>
    <a href="#" class="btn">Botón 2</a>
    <a href="#" class="btn">Botón 3</a>
</body></html>

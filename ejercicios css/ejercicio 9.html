<!-- 
EJERCICIO 9 - Creación de efectos de hover: 
Agrega efectos de hover a varios elementos de tu página,
como cambios de color, sombras o animaciones simples, utilizando la pseudo-clase :hover
en CSS.
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 9 - Creación de efectos de hover</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            padding: 20px;
            text-align: center;
        }
        .hover-effect {
            display: inline-block;
            padding: 20px;
            margin: 20px;
            background-color: #3498db;
            color: #fff;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .hover-effect:hover {
            background-color: #2980b9;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transform: scale(1.1);
        }
    </style>
</head><body>
    <h1>Efectos de hover en CSS</h1>
    <div class="hover-effect">Elemento 1</div>
    <div class="hover-effect">Elemento 2</div>
    <div class="hover-effect">Elemento 3</div>
</body></html>
